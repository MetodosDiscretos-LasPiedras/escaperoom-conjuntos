<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room: Métodos Discretos - UTU</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .score-pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); color: #facc15; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState({ nombre: '', apellido: '' });
            const [step, setStep] = useState('login'); 
            const [clues, setClues] = useState([]);
            const [activeClue, setActiveClue] = useState(null);
            const [words, setWords] = useState(Array(8).fill(null));
            const [guess, setGuess] = useState("");
            const [solved, setSolved] = useState(false);
            const [score, setScore] = useState(1000);
            const [scoreTrigger, setScoreTrigger] = useState(0);

            const SECRET = "la lógica de conjuntos es la base digital";

            const initGame = useCallback(() => {
                const rand = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
                const sort = (arr) => [...arr].sort(() => Math.random() - 0.5);

                const data = [
                    // Pista 1: Unión (La)
                    (() => {
                        const n = rand(1, 5);
                        const A = [n, n+1, n+2, n+3, n+4];
                        const B = [n+3, n+4, n+5, n+6];
                        const res = new Set([...A, ...B]).size;
                        return { id: 0, title: "Unión y Cardinalidad", prob: `Dados A={${A.join(',')}} y B={${B.join(',')}}, halla |A ∪ B|:`, opts: sort([{l: String(res), w: "La"}, {l: String(res+2), w: "El"}, {l: "5", w: "Internet"}]), ans: String(res) };
                    })(),
                    // Pista 2: Comprensión (lógica)
                    (() => {
                        const m = rand(1, 4);
                        return { id: 1, title: "Comprensión", prob: `Sea A={x ∈ ℕ | x es par ∧ ${m} < x ≤ ${m+8}}. ¿Cuántos elementos tiene A?`, opts: sort([{l: "4 elementos", w: "lógica"}, {l: "5 elementos", w: "física"}, {l: "3 elementos", w: "redes"}]), ans: "4 elementos" };
                    })(),
                    // Pista 3: Complemento (de)
                    (() => {
                        const u = rand(10, 12);
                        const k = rand(3, 4);
                        const countA = Math.floor((u-1)/k);
                        const res = u - countA;
                        return { id: 2, title: "Complemento", prob: `Si U={0,1,...,${u-1}} y A={x∈U | x es múltiplo de ${k} (x>0)}, halla |A'|:`, opts: sort([{l: String(res), w: "de"}, {l: String(res-2), w: "para"}, {l: String(res+1), w: "con"}]), ans: String(res) };
                    })(),
                    // Pista 4: Dif. Simétrica (conjuntos)
                    (() => {
                        const n = rand(10, 20);
                        const res = `{${n}, ${n+1}, ${n+3}, ${n+4}}`;
                        return { id: 3, title: "Dif. Simétrica", prob: `Si A={${n},${n+1},${n+2}} y B={${n+2},${n+3},${n+4}}, halla A Δ B:`, opts: sort([{l: res, w: "conjuntos"}, {l: `{${n+2}}`, w: "sistemas"}, {l: "∅", w: "nodos"}]), ans: res };
                    })(),
                    // Pista 5: Inclusión (es)
                    (() => {
                        const c = rand(0, 1);
                        const q = c === 0 ? "A ∩ B = B" : "A ∪ B = A";
                        return { id: 4, title: "Inclusión", prob: `Si se cumple que ${q}, ¿qué es necesariamente cierto?`, opts: sort([{l: "B ⊆ A", w: "es"}, {l: "A ⊆ B", w: "no"}, {l: "A = ∅", w: "si"}]), ans: "B ⊆ A" };
                    })(),
                    // Pista 6: Prod. Cartesiano (la)
                    (() => {
                        const a = rand(3, 4), b = rand(2, 3);
                        return { id: 5, title: "Prod. Cartesiano", prob: `Si |A|=${a} y |B|=${b}, ¿cuántos elementos tiene A × B?`, opts: sort([{l: String(a*b), w: "la"}, {l: String(a+b), w: "una"}, {l: "0", w: "otra"}]), ans: String(a*b) };
                    })(),
                    // Pista 7: Diferencia / Vacío (base)
                    (() => {
                        const v = rand(0, 1) === 1;
                        const n = rand(1, 30);
                        const A = [n, n+1], B = v ? [n, n+1, n+2] : [n+2, n+3];
                        const res = v ? "∅" : `{${n}, ${n+1}}`;
                        return { id: 6, title: "Diferencia", prob: `Si A={${A.join(',')}} y B={${B.join(',')}}, halla A - B:`, opts: sort([{l: res, w: "base"}, {l: v ? `{${n}}` : "∅", w: "clave"}, {l: `{${n+2}}`, w: "fuente"}]), ans: res };
                    })(),
                    // Pista 8: Extensión (digital)
                    (() => {
                        const picks = [{w:"METODOS", v:"{E, O}"}, {w:"UTU", v:"{U}"}, {w:"DISCRETOS", v:"{I, E, O}"}];
                        const p = picks[rand(0, 2)];
                        return { id: 7, title: "Extensión", prob: `Sea V el conjunto de vocales sin repetir de "${p.w}". Halla V:`, opts: sort([{l: p.v, w: "digital"}, {l: "{A,E,I,O,U}", w: "binaria"}, {l: "∅", w: "técnica"}]), ans: p.v };
                    })()
                ];
                setClues(data);
            }, []);

            const start = (e) => {
                e.preventDefault();
                if (user.nombre && user.apellido) {
                    initGame();
                    setStep('dash');
                }
            };

            const handleAns = (opt, ans) => {
                if (opt.l === ans) {
                    const next = [...words];
                    next[activeClue.id] = opt.w;
                    setWords(next);
                    setStep('dash');
                } else {
                    setScore(s => Math.max(0, s - 50));
                    setScoreTrigger(Date.now());
                    alert("Incorrecto. Pierdes 50 puntos.");
                }
            };

            const checkFinal = () => {
                if (guess.toLowerCase().trim() === SECRET) setSolved(true);
                else {
                    setScore(s => Math.max(0, s - 20));
                    setScoreTrigger(Date.now());
                    alert("Frase incorrecta.");
                }
            };

            if (solved) return (
                <div className="min-h-screen flex items-center justify-center p-6 text-center">
                    <div className="bg-white text-slate-900 p-10 rounded-3xl shadow-2xl max-w-lg border-t-8 border-green-500">
                        <Icon name="award" size={64} className="text-yellow-500 mx-auto mb-4" />
                        <h1 className="text-3xl font-black mb-2">¡SISTEMA RECUPERADO!</h1>
                        <p className="mb-6 font-medium">{user.nombre} {user.apellido}, has salvado el WiFi.</p>
                        <div className="bg-indigo-50 p-6 rounded-2xl mb-6">
                            <span className="text-xs font-bold text-slate-400 block uppercase mb-1">Puntaje</span>
                            <span className="text-5xl font-black text-indigo-600">{score}</span>
                        </div>
                        <button onClick={() => window.location.reload()} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">Reiniciar</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 min-h-screen">
                    <header className="flex justify-between items-center mb-8 bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-lg"><Icon name="wifi" size={20} /></div>
                            <div><h1 className="font-black text-lg">ESCAPE ROOM</h1><p className="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Métodos Discretos - UTU</p></div>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-slate-500 font-bold uppercase">Puntos</p>
                            <p className={`text-3xl font-black text-yellow-500 leading-none ${scoreTrigger ? 'score-pop' : ''}`} key={scoreTrigger}>{score}</p>
                        </div>
                    </header>

                    {step === 'login' && (
                        <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 max-w-md mx-auto shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 text-center">Ingreso de Analista</h2>
                            <form onSubmit={start} className="space-y-4">
                                <input required className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 outline-none focus:border-indigo-500" placeholder="Nombre" onChange={e => setUser({...user, nombre: e.target.value})} />
                                <input required className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 outline-none focus:border-indigo-500" placeholder="Apellido" onChange={e => setUser({...user, apellido: e.target.value})} />
                                <button className="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition shadow-lg uppercase tracking-widest text-sm">Comenzar Misión</button>
                            </form>
                        </div>
                    )}

                    {step === 'dash' && (
                        <div className="space-y-8 animate-in fade-in duration-500">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {clues.map((c, i) => (
                                    <button key={c.id} onClick={() => { setActiveClue(c); setStep('clue'); }} className={`p-6 rounded-2xl border-2 flex flex-col items-center gap-3 transition-all hover:scale-105 ${words[i] ? 'bg-indigo-900/30 border-indigo-500' : 'bg-slate-800 border-slate-700 hover:border-slate-500'}`}>
                                        <Icon name={words[i] ? "unlock" : "lock"} size={20} className={words[i] ? "text-indigo-400" : "text-slate-600"} />
                                        <span className="text-xs font-bold uppercase">Pista {i+1}</span>
                                        {words[i] && <span className="text-sm font-black text-indigo-200 italic">{words[i]}</span>}
                                    </button>
                                ))}
                            </div>
                            <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 text-center shadow-inner">
                                <div className="flex flex-wrap justify-center gap-2 mb-8">
                                    {words.map((w, i) => <div key={i} className={`px-4 py-2 rounded-lg border-b-2 font-mono text-lg transition-colors ${w ? 'border-indigo-500 text-indigo-300' : 'border-slate-700 text-slate-700'}`}>{w || "________"}</div>)}
                                </div>
                                <input className="w-full max-w-md bg-slate-950 border border-slate-700 rounded-full px-6 py-4 text-center text-xl outline-none focus:border-indigo-500 mb-6 placeholder:text-slate-800" placeholder="Ingresa la frase descubierta..." onChange={e => setGuess(e.target.value)} />
                                <br/><button onClick={checkFinal} className="bg-green-600 hover:bg-green-500 px-10 py-4 rounded-full font-black text-xs uppercase tracking-widest shadow-lg transition-all active:scale-95">Validar Acceso</button>
                            </div>
                        </div>
                    )}

                    {step === 'clue' && activeClue && (
                        <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 animate-in zoom-in duration-200">
                            <button onClick={() => setStep('dash')} className="text-xs text-slate-500 mb-6 flex items-center gap-2 hover:text-white transition-colors uppercase font-bold tracking-widest"><Icon name="chevron-left" size={14}/> Regresar al Panel</button>
                            <h2 className="text-3xl font-black mb-6 tracking-tighter">{activeClue.title}</h2>
                            <div className="bg-slate-900 p-10 rounded-3xl mb-8 text-xl border border-slate-700 leading-relaxed font-medium">{activeClue.prob}</div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {activeClue.opts.map((o, i) => (
                                    <button key={i} onClick={() => handleAns(o, activeClue.ans)} className="p-8 bg-slate-700 border border-slate-600 rounded-2xl text-left hover:bg-indigo-600 transition-all font-bold group">
                                        <span className="text-[10px] block opacity-40 mb-1 group-hover:opacity-100 uppercase tracking-widest">Opción {i+1}</span>
                                        <span className="text-lg">{o.l}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
